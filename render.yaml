# Render Blueprint — Static Website only (frontend)
# API stays separate: https://abn-2-0.onrender.com
#
# Deploy:
#   Render Dashboard → New → Blueprint → connect repo → this render.yaml
#
# Or manual:
#   New → Static Site
#   Name: abn-community-web
#   Root Directory: (leave blank / repo root)
#   Build Command: npm install && npm run build
#   Publish Directory: dist

services:
  - type: web
    name: abn-community-web
    runtime: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://abn-2-0.onrender.com
