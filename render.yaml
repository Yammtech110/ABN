# Render Blueprint — API (already live) + Static Site (web + Admin panel)
# Repo: https://github.com/Yammtech110/ABN
#
# API is already deployed as: https://abn-my4f.onrender.com
#
# Create Static Site (Admin + full web app):
#   Render Dashboard → New → Static Site → connect Yammtech110/ABN
#   OR Blueprint apply this file
#
# After Static Site is live:
#   API env → FRONTEND_URL + CORS_ORIGINS = your static URL → Redeploy API

services:
  - type: web
    name: abn-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: STORAGE_MODE
        value: supabase
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

staticSites:
  - name: abn-web
    buildCommand: npm install && npm run build
    publishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://abn-my4f.onrender.com
      - key: VITE_SUPABASE_URL
        value: https://ogawxkmjrwcujulvnahy.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
